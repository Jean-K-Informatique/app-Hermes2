version: '3.8'

services:
  api-server:
    build:
      context: ./packages/api-server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://hermeschat:password@postgres:5432/hermeschat
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=15m
      - REFRESH_TOKEN_EXPIRY=30d
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - WHISPER_MODE=${WHISPER_MODE:-disabled}
      - WHISPER_API_KEY=${WHISPER_API_KEY:-}
      - EXPO_ACCESS_TOKEN=${EXPO_ACCESS_TOKEN:-}
      - MOCK_HERMES=${MOCK_HERMES:-false}
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=30
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=hermeschat
      - POSTGRES_USER=hermeschat
      - POSTGRES_PASSWORD=password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermeschat"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
